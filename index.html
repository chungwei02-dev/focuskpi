<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<title>太平區 區顧問訪店銷售儀表板</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: "Microsoft JhengHei", "PingFang TC", Arial, sans-serif; font-size: 13px; background: #f0f2f5; }

/* ===== SCREEN ONLY ===== */
@media screen {
  .control-panel {
    background: linear-gradient(135deg, #1a5276 0%, #2980b9 100%);
    padding: 16px 20px;
    display: flex; flex-wrap: wrap; gap: 14px; align-items: flex-end;
    position: sticky; top: 0; z-index: 100;
    box-shadow: 0 3px 12px rgba(0,0,0,0.3);
  }
  .control-panel h1 {
    width: 100%; color: #fff; font-size: 18px; letter-spacing: 2px;
    text-shadow: 0 1px 3px rgba(0,0,0,0.4);
    margin-bottom: 4px;
  }
  .ctrl-group { display: flex; flex-direction: column; gap: 4px; }
  .ctrl-group label { color: #d6eaf8; font-size: 11px; font-weight: bold; letter-spacing: 1px; }
  .ctrl-group select, .ctrl-group input {
    padding: 7px 12px; border: 1px solid rgba(255,255,255,0.3);
    border-radius: 6px; background: rgba(255,255,255,0.95);
    font-size: 13px; font-family: inherit; min-width: 140px;
    color: #1a3a5c;
  }
  .btn-print {
    background: #e74c3c; color: #fff; border: none;
    padding: 10px 22px; border-radius: 8px; font-size: 14px;
    font-weight: bold; cursor: pointer; letter-spacing: 1px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.3); transition: all 0.2s;
    align-self: flex-end;
  }
  .btn-print:hover { background: #c0392b; transform: translateY(-1px); }
  .page-wrapper { padding: 20px; display: flex; justify-content: center; }
  .form-page {
    width: 210mm; min-height: 297mm;
    background: #fff; box-shadow: 0 4px 24px rgba(0,0,0,0.2);
    padding: 12mm 12mm 10mm 12mm;
  }
}

/* ===== PRINT ONLY ===== */
@media print {
  .control-panel { display: none !important; }
  .page-wrapper { padding: 0; }
  body { background: #fff; }
  @page { size: A4 portrait; margin: 0; }

  .form-page {
    width: 210mm; height: 297mm; overflow: hidden;
    padding: 7mm 10mm 6mm 10mm;
    page-break-after: avoid;
  }

  /* 壓縮表頭 */
  .form-header { padding-bottom: 3px; margin-bottom: 3px; border-bottom-width: 2px; }
  .form-logo { font-size: 9px; margin-bottom: 1px; }
  .form-title { font-size: 14px; letter-spacing: 3px; margin: 1px 0; }
  .form-title-sub { font-size: 8px; }

  /* 壓縮資訊列 */
  .form-info-row { margin-bottom: 3px; }
  .form-info-cell { padding: 3px 6px; font-size: 10px; }
  .form-info-cell .field-label { font-size: 8px; }
  .form-info-cell .field-value { font-size: 11px; }

  /* 壓縮簽名列 */
  .sign-row { margin-top: 4px !important; }
  .sign-cell { padding: 3px 6px; font-size: 10px; }
  .sign-cell .sign-label { font-size: 9px; }
  .sign-cell .sign-line { font-size: 11px; height: 13px; }

  /* 壓縮統計卡 */
  .stats-row { gap: 4px; margin-bottom: 3px; }
  .stat-box { padding: 2px 4px; border-radius: 3px; }
  .stat-box .stat-val { font-size: 13px; }
  .stat-box .stat-lbl { font-size: 7.5px; }

  /* 壓縮圖表 */
  .chart-section { padding: 4px 6px; margin-bottom: 3px; }
  .chart-section-title { font-size: 8.5px; margin-bottom: 2px; }
  .chart-container { height: 95px; }
  .period-note { font-size: 7px; margin-top: 1px; }

  /* 壓縮資料表 */
  .data-section-title { font-size: 8.5px; padding: 2px; }
  table.data-table { font-size: 8px; }
  table.data-table th { padding: 2px 2px; font-size: 7.5px; }
  table.data-table td { padding: 1.5px 2px; }
  .rank-badge { padding: 0px 3px; font-size: 7.5px; border-radius: 6px; }

  /* 聚焦品欄列印時正常顯示，已改為顯示最近10檔減少行數 */
}

/* ===== FORM STYLES ===== */
.form-header {
  text-align: center; border-bottom: 3px double #1a5276; padding-bottom: 6px; margin-bottom: 6px;
}
.form-title-sub { font-size: 10px; color: #666; letter-spacing: 3px; }
.form-title {
  font-size: 18px; font-weight: bold; color: #1a5276;
  letter-spacing: 4px; margin: 2px 0;
}
.form-logo { font-size: 11px; color: #888; margin-bottom: 2px; }

.form-info-row {
  display: flex; gap: 0; border: 1px solid #2c3e50;
  border-radius: 4px; overflow: hidden; margin-bottom: 5px;
}
.form-info-cell {
  flex: 1; padding: 5px 8px; border-right: 1px solid #2c3e50;
  font-size: 12px;
}
.form-info-cell:last-child { border-right: none; }
.form-info-cell .field-label { color: #555; font-size: 10px; font-weight: bold; }
.form-info-cell .field-value { font-size: 13px; font-weight: bold; color: #1a3a5c; border-bottom: 1px solid #aaa; min-width: 60px; display: inline-block; }

.sign-row {
  display: flex; gap: 0; border: 1px solid #2c3e50;
  border-top: none; border-radius: 0 0 4px 4px;
  overflow: hidden; margin-bottom: 6px;
}
.sign-cell {
  flex: 1; padding: 4px 8px; border-right: 1px solid #2c3e50;
  font-size: 12px; display: flex; align-items: center; gap: 6px;
}
.sign-cell:last-child { border-right: none; }
.sign-cell .sign-label { color: #555; white-space: nowrap; font-size: 11px; }
.sign-cell .sign-line { flex: 1; border-bottom: 1px solid #333; min-width: 40px; height: 16px; font-weight: bold; color: #1a3a5c; font-size: 13px; }

/* Chart section */
.chart-section {
  border: 1px solid #2c3e50; border-radius: 4px; padding: 8px;
  margin-bottom: 6px; position: relative;
}
.chart-section-title {
  font-size: 11px; font-weight: bold; color: #1a5276;
  text-align: center; margin-bottom: 4px; letter-spacing: 1px;
}
.chart-container { position: relative; height: 160px; width: 100%; }
.stats-row {
  display: flex; gap: 8px; margin-bottom: 6px;
}
.stat-box {
  flex: 1; background: #eaf4fb; border: 1px solid #aed6f1;
  border-radius: 6px; padding: 5px 8px; text-align: center;
}
.stat-box .stat-val { font-size: 18px; font-weight: bold; color: #1a5276; }
.stat-box .stat-lbl { font-size: 10px; color: #666; }
.stat-box.highlight { background: #fef9e7; border-color: #f0c040; }
.stat-box.highlight .stat-val { color: #e67e22; }
.stat-box.good { background: #eafaf1; border-color: #82e0aa; }
.stat-box.good .stat-val { color: #1e8449; }

/* Table */
.data-section { border: 1px solid #2c3e50; border-radius: 4px; overflow: hidden; }
.data-section-title {
  background: #1a5276; color: #fff;
  font-size: 11px; font-weight: bold; text-align: center;
  padding: 4px; letter-spacing: 1px;
}
table.data-table {
  width: 100%; border-collapse: collapse; font-size: 10.5px;
}
table.data-table th {
  background: #2980b9; color: #fff; padding: 4px 3px;
  text-align: center; font-weight: bold; font-size: 10px;
  border: 1px solid #1a6090; white-space: nowrap;
}
table.data-table td {
  padding: 3px 4px; text-align: center; border: 1px solid #d5d8dc;
  white-space: nowrap;
}
table.data-table tr:nth-child(even) td { background: #f4f6f8; }
table.data-table tr:hover td { background: #d6eaf8; }
.rank-badge {
  display: inline-block; border-radius: 10px;
  padding: 1px 6px; font-weight: bold; font-size: 10px;
}
.rank-top { background: #27ae60; color: #fff; }
.rank-mid { background: #f39c12; color: #fff; }
.rank-low { background: #e74c3c; color: #fff; }
.rank-na { background: #bdc3c7; color: #666; }
.current-period { background: #fef9e7 !important; border-left: 3px solid #f0c040 !important; }
.current-period td { background: #fef9e7 !important; }

/* Products breakdown */
.products-mini { font-size: 9px; color: #555; text-align: left; }
.no-data { text-align: center; padding: 30px; color: #aaa; font-size: 14px; }
.period-note { font-size: 9px; color: #999; text-align: center; margin-top: 3px; }

/* 經營建議區塊 */
.advice-section {
  border: 1px solid #2c3e50; border-radius: 4px;
  margin-top: 6px; margin-bottom: 6px; overflow: hidden;
}
.advice-title {
  background: #1a5276; color: #fff;
  font-size: 11px; font-weight: bold;
  padding: 4px 8px; letter-spacing: 1px;
}
.advice-body {
  min-height: 72px; padding: 8px 10px;
  font-size: 12px; line-height: 1.8;
  color: #1a3a5c; outline: none;
  background: #fff;
  /* 列印時橫線輔助書寫 */
  background-image: repeating-linear-gradient(
    to bottom, transparent, transparent 27px, #e0e7ef 27px, #e0e7ef 28px
  );
  background-position: 0 8px;
}
.advice-body:empty::before {
  content: attr(data-placeholder);
  color: #bbb; pointer-events: none;
}
/* 列印時隱藏 placeholder、鎖定高度 */
@media print {
  .advice-body { min-height: 76px; background-color: #fff; }
  .advice-body:empty::before { content: ""; }
  .advice-section { margin-top: 4px; margin-bottom: 4px; }
  .advice-title { font-size: 8.5px; padding: 2px 6px; }
  .advice-body { font-size: 10px; padding: 4px 8px; min-height: 60px; }
}
</style>
</head>
<body>

<!-- Control Panel (Screen Only) -->
<div class="control-panel">
  <h1>🏪 太平區 · 區顧問訪店銷售儀表板</h1>
  <div class="ctrl-group">
    <label>📋 選擇區顧問</label>
    <select id="selOfc" onchange="onOFCChange()">
      <option value="">-- 請選擇區顧問 --</option>
    </select>
  </div>
  <div class="ctrl-group">
    <label>🏪 選擇門市</label>
    <select id="selStore" onchange="onStoreChange()">
      <option value="">-- 請先選擇區顧問 --</option>
    </select>
  </div>
  <div class="ctrl-group">
    <label>📅 訪店日期</label>
    <input type="date" id="inpDate" oninput="updateFormFields()">
  </div>
  <div class="ctrl-group">
    <label>⏰ 訪店時間</label>
    <input type="time" id="inpTime" oninput="updateFormFields()">
  </div>
  <div class="ctrl-group">
    <label>👤 店經理</label>
    <input type="text" id="inpStoreMgr" placeholder="店經理姓名" style="min-width:100px" oninput="updateFormFields()">
  </div>
  <div class="ctrl-group">
    <label>👔 區經理審核</label>
    <input type="text" id="inpDistMgr" placeholder="區經理姓名" style="min-width:100px" oninput="updateFormFields()">
  </div>
  <button class="btn-print" onclick="window.print()">🖨️ 列印 / 輸出 PDF</button>
</div>

<!-- A4 Form Page -->
<div class="page-wrapper">
  <div class="form-page" id="formPage">
    <!-- Form Header -->
    <div class="form-header">
      <div class="form-logo">統 一 超 商 股 份 有 限 公 司</div>
      <div class="form-title">區 顧 問 週 訪 店 溝 通 紀 錄 表</div>
      <div class="form-title-sub">太平區 · 經營聚焦銷售追蹤</div>
    </div>

    <!-- Info Row -->
    <div class="form-info-row">
      <div class="form-info-cell" style="flex:2">
        <span class="field-label">門市名稱　</span>
        <span class="field-value" id="dispStore">　　　　　</span>
      </div>
      <div class="form-info-cell" style="flex:2">
        <span class="field-label">區顧問　</span>
        <span class="field-value" id="dispOfc">　　　　</span>
      </div>
      <div class="form-info-cell" style="flex:2">
        <span class="field-label">日期　</span>
        <span class="field-value" id="dispDate">　　年　　月　　日</span>
      </div>
      <div class="form-info-cell" style="flex:1.2">
        <span class="field-label">訪店時間　</span>
        <span class="field-value" id="dispTime">　　:　　</span>
      </div>
    </div>

    <!-- Stats Summary -->
    <div class="stats-row" id="statsRow" style="display:none">
      <div class="stat-box" id="statCurrSales">
        <div class="stat-val" id="statCurrSalesVal">--</div>
        <div class="stat-lbl">本檔門市銷售額（元）</div>
      </div>
      <div class="stat-box highlight" id="statStoreRank">
        <div class="stat-val" id="statStoreRankVal">--</div>
        <div class="stat-lbl">門市太平區名次</div>
      </div>
      <div class="stat-box" id="statOfcSales">
        <div class="stat-val" id="statOfcSalesVal">--</div>
        <div class="stat-lbl">本檔區顧問銷售額（元）</div>
      </div>
      <div class="stat-box highlight" id="statOfcRank">
        <div class="stat-val" id="statOfcRankVal">--</div>
        <div class="stat-lbl">區顧問太平區名次</div>
      </div>
      <div class="stat-box good" id="statDistRank">
        <div class="stat-val" id="statDistRankVal">--</div>
        <div class="stat-lbl">太平區中一區名次</div>
      </div>
    </div>

    <!-- Chart Section -->
    <div class="chart-section">
      <div class="chart-section-title">▲ 聚焦銷售趨勢圖（各檔期平折後銷售額）</div>
      <div class="chart-container">
        <canvas id="trendChart"></canvas>
      </div>
      <div class="period-note" id="chartNote">請選擇區顧問及門市以顯示趨勢圖</div>
    </div>

    <!-- Data Table -->
    <div class="data-section">
      <div class="data-section-title">▼ 各檔期銷售明細 · 太平區排名追蹤</div>
      <div id="tableContainer">
        <div class="no-data">請選擇區顧問及門市以顯示資料</div>
      </div>
    </div>

    <!-- 經營建議區塊 -->
    <div class="advice-section">
      <div class="advice-title">▌ 本次訪店經營建議</div>
      <div class="advice-body" contenteditable="true" id="adviceText" data-placeholder="請輸入本次訪店重點建議…（可直接在此輸入文字）"></div>
    </div>

    <!-- Signature Row (Footer) -->
    <div class="sign-row" style="margin-top: 8px; border-radius: 4px; border-top: 1px solid #2c3e50;">
      <div class="sign-cell">
        <span class="sign-label">區經理審核：</span>
        <span class="sign-line" id="dispDistMgr"></span>
      </div>
      <div class="sign-cell">
        <span class="sign-label">區顧問：</span>
        <span class="sign-line" id="dispOfc2"></span>
      </div>
      <div class="sign-cell">
        <span class="sign-label">店經理：</span>
        <span class="sign-line" id="dispStoreMgr"></span>
      </div>
    </div>
  </div>
</div>

// ===== STATE =====
let currentOfc = '';
let currentStore = '';
let chartInstance = null;

// ===== INIT =====
window.onload = function() {
  // Set today's date
  const today = new Date();
  document.getElementById('inpDate').value = today.toISOString().split('T')[0];
  
  // Get all OFCs from latest period
  const latestPeriod = ALL_DATA[ALL_DATA.length - 1];
  const ofcs = [...new Set(latestPeriod.store_data.map(s => s.ofc))].sort();
  
  const selOfc = document.getElementById('selOfc');
  ofcs.forEach(ofc => {
    const opt = document.createElement('option');
    opt.value = ofc;
    opt.textContent = ofc;
    selOfc.appendChild(opt);
  });
};

function onOFCChange() {
  currentOfc = document.getElementById('selOfc').value;
  currentStore = '';
  
  const selStore = document.getElementById('selStore');
  selStore.innerHTML = '<option value="">-- 請選擇門市 --</option>';
  
  if (!currentOfc) return;
  
  // 收集所有期間中該 OFC 負責過的門市（合集），避免近期換人的門市消失
  const storeSet = new Set();
  ALL_DATA.forEach(period => {
    period.store_data
      .filter(s => s.ofc === currentOfc)
      .forEach(s => storeSet.add(s.store));
  });
  // 同時也把最新一期所有該名字出現的門市加入（若 OFC 姓名跨期一致）
  const stores = [...storeSet].sort();
  
  stores.forEach(store => {
    const opt = document.createElement('option');
    opt.value = store;
    opt.textContent = store;
    selStore.appendChild(opt);
  });
  
  updateFormFields();
  updateDashboard();
}

function onStoreChange() {
  currentStore = document.getElementById('selStore').value;
  updateFormFields();
  updateDashboard();
}

function updateFormFields() {
  // Update form display fields
  document.getElementById('dispOfc').textContent = currentOfc || '　　　　';
  document.getElementById('dispOfc2').textContent = currentOfc || '';
  document.getElementById('dispStore').textContent = currentStore || '　　　　　';
  document.getElementById('dispStoreMgr').textContent = document.getElementById('inpStoreMgr').value || '';
  document.getElementById('dispDistMgr').textContent = document.getElementById('inpDistMgr').value || '';
  
  const dateVal = document.getElementById('inpDate').value;
  if (dateVal) {
    const d = new Date(dateVal);
    const roc_year = d.getFullYear() - 1911;
    document.getElementById('dispDate').textContent = 
      `${roc_year} 年 ${d.getMonth()+1} 月 ${d.getDate()} 日`;
  }
  
  const timeVal = document.getElementById('inpTime').value;
  document.getElementById('dispTime').textContent = timeVal || '　　:　　';
}

function getRankClass(rank, total) {
  if (!rank || !total) return 'rank-na';
  const pct = rank / total;
  if (pct <= 0.33) return 'rank-top';
  if (pct <= 0.66) return 'rank-mid';
  return 'rank-low';
}

function formatMoney(val) {
  if (!val) return '--';
  return Math.round(val).toLocaleString('zh-TW');
}

function updateDashboard() {
  if (!currentOfc) return;
  
  // Gather data across all periods
  const periodData = [];
  
  ALL_DATA.forEach(period => {
    const ofcInfo = period.ofc_data.find(o => o.ofc === currentOfc);
    // 門市查詢只比對店名，不綁定區顧問（因為同一門市可能跨期換過負責人）
    const storeInfo = currentStore ?
      period.store_data.find(s => s.store === currentStore) : null;
    
    // Count total OFCs in 太平區 for this period
    const totalOfcs = period.ofc_data.length;
    // Count total stores in 太平區
    const totalStores = period.store_data.length;
    
    periodData.push({
      period: period.period,
      label: period.label,
      dates: period.dates,
      district_total: period.district_total,
      district_rank: period.district_rank,
      district_internal_rank: period.district_internal_rank,
      district_internal_total: period.district_internal_total,
      ofc_total: ofcInfo ? ofcInfo.total : null,
      ofc_district_rank: ofcInfo ? ofcInfo.district_rank : null,
      ofc_nat_rank: ofcInfo ? ofcInfo.nat_rank : null,
      total_ofcs: totalOfcs,
      store_total: storeInfo ? storeInfo.total : null,
      store_district_rank: storeInfo ? storeInfo.district_rank : null,
      total_stores: totalStores,
      products: storeInfo ? storeInfo.products : (ofcInfo ? null : null)
    });
  });
  
  updateStats(periodData);
  const last10 = periodData.slice(-10);
  updateChart(last10);
  updateTable(last10);
}

function updateStats(periodData) {
  const latest = periodData[periodData.length - 1];
  const statsRow = document.getElementById('statsRow');
  statsRow.style.display = 'flex';
  
  document.getElementById('statCurrSalesVal').textContent = 
    latest.store_total ? formatMoney(latest.store_total) : '--';
  document.getElementById('statStoreRankVal').textContent = 
    latest.store_district_rank ? `${latest.store_district_rank} / ${latest.total_stores}` : '--';
  document.getElementById('statOfcSalesVal').textContent = 
    latest.ofc_total ? formatMoney(latest.ofc_total) : '--';
  document.getElementById('statOfcRankVal').textContent = 
    latest.ofc_district_rank ? `${latest.ofc_district_rank} / ${latest.total_ofcs}` : '--';
  document.getElementById('statDistRankVal').textContent = 
    latest.district_internal_rank ? 
    `${latest.district_internal_rank} / ${latest.district_internal_total}` : '--';
  
  // Color coding for stat boxes
  if (latest.store_district_rank && latest.total_stores) {
    const pct = latest.store_district_rank / latest.total_stores;
    const box = document.getElementById('statStoreRank');
    box.style.background = pct <= 0.33 ? '#eafaf1' : pct <= 0.66 ? '#fef9e7' : '#fdedec';
    box.style.borderColor = pct <= 0.33 ? '#82e0aa' : pct <= 0.66 ? '#f0c040' : '#f1948a';
    document.getElementById('statStoreRankVal').style.color = 
      pct <= 0.33 ? '#1e8449' : pct <= 0.66 ? '#e67e22' : '#c0392b';
  }
}

function updateChart(periodData) {
  const ctx = document.getElementById('trendChart').getContext('2d');

  const datasets = [];
  if (currentStore) {
    datasets.push({
      label: `門市【${currentStore}】`,
      data: periodData.map(p => p.store_total ? Math.round(p.store_total) : null),
      borderColor: '#e74c3c', backgroundColor: 'rgba(231,76,60,0.1)',
      borderWidth: 2.5, pointRadius: 4, pointBackgroundColor: '#e74c3c',
      tension: 0.3, fill: true,
    });
  }
  datasets.push({
    label: `區顧問【${currentOfc}】`,
    data: periodData.map(p => p.ofc_total ? Math.round(p.ofc_total) : null),
    borderColor: '#2980b9', backgroundColor: 'rgba(41,128,185,0.08)',
    borderWidth: 2, pointRadius: 3, pointBackgroundColor: '#2980b9',
    tension: 0.3, fill: !currentStore,
  });
  datasets.push({
    label: '太平區合計',
    data: periodData.map(p => p.district_total ? Math.round(p.district_total) : null),
    borderColor: '#27ae60', backgroundColor: 'rgba(39,174,96,0.05)',
    borderWidth: 1.5, borderDash: [5, 3], pointRadius: 2, pointBackgroundColor: '#27ae60',
    tension: 0.3, fill: false,
  });

  if (chartInstance) chartInstance.destroy();

  chartInstance = new Chart(ctx, {
    type: 'line',
    data: { labels: periodData.map(p => p.label), datasets },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: {
          position: 'top',
          labels: { font: { size: 10 }, padding: 8, boxWidth: 20 }
        },
        tooltip: {
          callbacks: {
            afterBody: function(items) {
              const p = periodData[items[0].dataIndex];
              const lines = [`📅 ${p.dates}`];
              if (p.store_district_rank) lines.push(`門市名次：${p.store_district_rank}/${p.total_stores}`);
              if (p.ofc_district_rank)   lines.push(`OFC名次：${p.ofc_district_rank}/${p.total_ofcs}`);
              lines.push(`太平區中一區：${p.district_internal_rank}/${p.district_internal_total}`);
              return lines;
            }
          }
        }
      },
      scales: {
        y: {
          beginAtZero: false,
          grid: { color: 'rgba(0,0,0,0.06)' },
          ticks: { font: { size: 9 }, callback: v => v >= 1000 ? (v/1000).toFixed(1)+'K' : v }
        },
        x: {
          grid: { display: false },
          ticks: { font: { size: 9 }, maxRotation: 0 }
        }
      }
    }
  });

  document.getElementById('chartNote').textContent =
    `近 ${periodData.length} 個檔期 ● 最新：第${periodData[periodData.length-1].period}檔 (${periodData[periodData.length-1].dates})`;
}

function updateTable(periodData) {
  const container = document.getElementById('tableContainer');
  
  let html = `<table class="data-table">
    <thead>
      <tr>
        <th>檔期</th>
        <th>期間</th>
        <th>門市銷售額</th>
        <th>門市<br>太平區名次</th>
        <th>區顧問銷售額</th>
        <th>OFC<br>太平區名次</th>
        <th>OFC<br>全國名次</th>
        <th>太平區<br>中一區名次</th>
        <th class="col-products">主要聚焦品銷售</th>
      </tr>
    </thead>
    <tbody>`;
  
  const latestPeriod = periodData[periodData.length - 1].period;
  
  [...periodData].reverse().forEach(p => {
    const isLatest = p.period === latestPeriod;
    const rowClass = isLatest ? 'current-period' : '';
    
    // Store rank badge
    const storeRankClass = getRankClass(p.store_district_rank, p.total_stores);
    const storeRankText = p.store_district_rank ? 
      `<span class="rank-badge ${storeRankClass}">${p.store_district_rank}/${p.total_stores}</span>` : 
      '<span class="rank-badge rank-na">--</span>';
    
    // OFC rank badge
    const ofcRankClass = getRankClass(p.ofc_district_rank, p.total_ofcs);
    const ofcRankText = p.ofc_district_rank ? 
      `<span class="rank-badge ${ofcRankClass}">${p.ofc_district_rank}/${p.total_ofcs}</span>` : 
      '<span class="rank-badge rank-na">--</span>';
    
    // District rank badge
    const distRankClass = getRankClass(p.district_internal_rank, p.district_internal_total);
    const distRankText = p.district_internal_rank ? 
      `<span class="rank-badge ${distRankClass}">${p.district_internal_rank}/${p.district_internal_total}</span>` : 
      '<span class="rank-badge rank-na">--</span>';
    
    // National OFC rank
    const natRankClass = p.ofc_nat_rank ? (p.ofc_nat_rank <= 30 ? 'rank-top' : p.ofc_nat_rank <= 60 ? 'rank-mid' : 'rank-low') : 'rank-na';
    const natRankText = p.ofc_nat_rank ? 
      `<span class="rank-badge ${natRankClass}">${p.ofc_nat_rank}</span>` : 
      '<span class="rank-badge rank-na">--</span>';
    
    // Products mini display
    let prodsHtml = '';
    if (p.products) {
      const prods = Object.entries(p.products)
        .filter(([k, v]) => v > 0)
        .sort((a, b) => b[1] - a[1])
        .slice(0, 3);
      if (prods.length > 0) {
        prodsHtml = '<div class="products-mini">' + 
          prods.map(([k, v]) => {
            const shortName = k.length > 12 ? k.substring(0, 12) + '…' : k;
            return `${shortName}: ${Math.round(v)}`;
          }).join('<br>') + '</div>';
      }
    }
    
    html += `<tr class="${rowClass}">
      <td><b>${p.label}</b>${isLatest ? ' ★' : ''}</td>
      <td>${p.dates}</td>
      <td>${p.store_total ? formatMoney(p.store_total) : '<span style="color:#aaa">-</span>'}</td>
      <td>${storeRankText}</td>
      <td>${p.ofc_total ? formatMoney(p.ofc_total) : '--'}</td>
      <td>${ofcRankText}</td>
      <td>${natRankText}</td>
      <td>${distRankText}</td>
      <td class="col-products" style="text-align:left; max-width: 140px;">${prodsHtml || '<span style="color:#aaa">-</span>'}</td>
    </tr>`;
  });
  
  html += '</tbody></table>';
  container.innerHTML = html;
}
</script>
</body>
</html>
